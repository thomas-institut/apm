#
# Docker compose file with all services necessary to run the APE backend locally
#
# All containers have ${DEV_TMP}/ape-backend mapped to /var/ape-backend and ${APE_SRC} mapped to /opt/ape-backend.
#
#  Rafael Nájera
#
# Created:  11 May 2026
#
name: ape-backend-dev

services:
  nginx:
    container_name: ape-backend-nginx
    image: nginx:latest
    ports:
      - "${APE_API_PORT}:80"
    volumes:
      - ${REPO_ROOT}/${APE_SRC}:/opt/ape-backend
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ${REPO_ROOT}/${DEV_TMP}/ape-backend/logs/nginx:/var/log/nginx
      - ${REPO_ROOT}/${DEV_TMP}/ape-backend:/var/ape-backend
    depends_on:
      - php

  mysql:
    container_name: ape-mysql
    image: mysql:8.0
    ports:
      - "5306:3306" # so that it can be accessed from the host machine!
    environment:
        MYSQL_ALLOW_EMPTY_PASSWORD: yes
        MYSQL_ROOT_PASSWORD:
    volumes:
      - ${REPO_ROOT}/${DEV_TMP}/ape-backend/mysql-data:/var/lib/mysql
      - ${REPO_ROOT}/${DEV_TMP}/ape-backend:/var/ape-backend

  # Normally, on the first run, the database should be initialized with a working db backup.
  # Copy the backup file to ${DEV_TMP}/ape-backend/share and source it in the container.
  # It is also possible, of course, to create an empty database and initialize with the SQL scripts in src/db

  php:
    container_name: ape-php
    build:
      context: .
      dockerfile: dev-php.Dockerfile
    volumes:
      - ${REPO_ROOT}/${APE_SRC}:/opt/ape-backend
      - ${REPO_ROOT}/${DEV_TMP}/ape-backend:/var/ape-backend
    depends_on:
      - mysql

  valkey:
    container_name: ape-valkey
    image: valkey/valkey:8.1-alpine
    volumes:
      - ${REPO_ROOT}/${DEV_TMP}/ape-backend/valkey-data:/data
    command: valkey-server --save 60 1 --loglevel warning --dir /data
