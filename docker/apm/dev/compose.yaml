#
# Docker compose file with all services necessary to run APM
# locally for development.
#
# All containers have ${DEV_TMP}/apm mapped to /var/apm and ${APM_SRC} mapped to /opt/apm.
#
#  Rafael Nájera
#
# Created:  17 Jun 2025
# Modified: 09 May 2026
#
name: apm-development

services:
  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "8888:80"
    volumes:
      - ${REPO_ROOT}/${APM_SRC}:/opt/apm
      - ${REPO_ROOT}/${SHARED_PHP_SRC}:/opt/shared-php
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ${REPO_ROOT}/${DEV_TMP}/apm/logs/nginx:/var/log/nginx
      - ${REPO_ROOT}/${DEV_TMP}/apm:/var/apm
    depends_on:
      - php

  mysql:
    container_name: mysql
    image: mysql:8.0
    ports:
      - "4306:3306" # so that it can be accessed from the host machine!
    environment:
        MYSQL_ALLOW_EMPTY_PASSWORD: yes
        MYSQL_ROOT_PASSWORD:
    volumes:
      - ${REPO_ROOT}/${DEV_TMP}/apm/mysql-data:/var/lib/mysql
      - ${REPO_ROOT}/${DEV_TMP}/apm:/var/apm

  # Normally, on the first run, the database should be initialized with a working db backup.
  # Copy the backup file to ${DEV_TMP}/apm/share and source it in the container.
  # It is also possible, of course, to create an empty database and initialize with the SQL scripts in src/db

  php:
    container_name: php
    build:
      context: .
      dockerfile: dev-php.Dockerfile
    volumes:
      - ${REPO_ROOT}/${APM_SRC}:/opt/apm
      - ${REPO_ROOT}/${SHARED_PHP_SRC}:/opt/shared-php
      - ${REPO_ROOT}/${DEV_TMP}/apm:/var/apm
    depends_on:
      - mysql

  typesetting:
    container_name: typesetting
    build:
      context: .
      dockerfile: dev-typesetting.Dockerfile
    ports:
      - "4711:4711"
    volumes:
      - ${REPO_ROOT}/${APM_SRC}:/opt/apm
      - ${REPO_ROOT}/${DEV_TMP}/apm:/var/apm

  #
  # The configuration should be finished manually the first time the container is started:
  #
  # 1. Install APM fonts:
  #    In the host machine, copy the contents of the fontserver to ${DEV_TMP}/apm/apm-fonts
  #    (the symlink in the container /usr/share/fonts/apm-fonts is already created)
  #
  # 2. Index data in Typesense (see below)
  #


  collatex:
    container_name: collatex
    build: ../collatex-http

  valkey:
    container_name: valkey
    image: valkey/valkey:8.1-alpine
    volumes:
      - ${REPO_ROOT}/${DEV_TMP}/apm/valkey-data:/data
    command: valkey-server --save 60 1 --loglevel warning --dir /data

  typesense:
    container_name: typesense
    image: typesense/typesense:28.0
    volumes:
      - ${REPO_ROOT}/${DEV_TMP}/apm/typesense-data:/data
    command: >
      typesense-server
      --data-dir /data
      --api-key=devel1234
      --listen-port=8108
      --enable-cors

 # In order for the search engine to work, the data must be indexed in typesense.
 # Run the following commands in the PHP container to build it from sc
 #     php /opt/apm/www/utilities/indexmanager editions build
 #     php /opt/apm/www/utilities/indexmanager transcriptions build
 # This will take a long time the first time!
 #
 #  Use 'check' instead of 'build' in the commands above to check if the index is up to date
 #  (in case some typesense data was in ${DEV_TMP}/apm/typesense-data)